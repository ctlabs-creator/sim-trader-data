name: Fetch prices

on:
  # Run on a schedule. Cron times are in UTC.
  # We need to cover both UK (LSE) and US (NYSE/Nasdaq) market hours.
  # UK market: 08:00-16:30 UK time. US market: 14:30-21:00 UK time.
  # UK clocks shift between BST (UTC+1) and GMT (UTC+0), so we use a wide
  # UTC window that covers both seasons:
  #   - Summer (BST): combined 07:00-20:00 UTC
  #   - Winter (GMT): combined 08:00-21:00 UTC
  # Wider window 07:00-21:00 UTC catches both. Runs every 30 minutes,
  # weekdays only. Bank holidays still fire but yfinance returns stale data,
  # which is what a real feed does too.
  schedule:
    - cron: "0,30 7-21 * * 1-5"

  # Allow manual runs from the Actions tab — useful for testing.
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      # We need write access to commit the updated prices.json back to the repo.
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run fetcher
        run: python fetch_prices.py

      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          # Only commit if there are actual changes — avoids cluttering history
          # with empty commits when prices haven't moved.
          if ! git diff --staged --quiet; then
            git commit -m "Update prices.json"
            git push
          else
            echo "No changes to prices.json, skipping commit"
          fi
