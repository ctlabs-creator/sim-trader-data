name: Fetch history

on:
  # Once a day, after US market close.
  # US market closes at 21:00 UTC (BST) or 22:00 UTC (GMT).
  # We run at 22:30 UTC on weekdays — late enough to catch the day's bar
  # in either season, early enough that history.json is fresh by morning.
  schedule:
    - cron: "30 22 * * 1-5"

  # Allow manual runs from the Actions tab — useful for testing.
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      # We need write access to commit the updated history.json back to the repo.
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run fetcher
        run: python fetch_history.py

      - name: Commit updated history.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          if ! git diff --staged --quiet; then
            git commit -m "Update history.json"
            git push
          else
            echo "No changes to history.json, skipping commit"
          fi
